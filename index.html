<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>갑우 콘텐츠사업부 — 연간 프로젝트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
@keyframes spin{to{transform:rotate(360deg);}}
body{font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;background:#F7F8FA;font-size:13px;}

/* ── 툴바 ── */
.toolbar{background:#fff;border-bottom:1px solid #E2E6ED;padding:11px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:40;}
.toolbar-title{font-size:16px;font-weight:700;color:#1E3A5F;}
.toolbar-sub{font-size:11px;color:#8C93A4;margin-top:2px;}
.legend{display:flex;flex-wrap:wrap;gap:4px 10px;align-items:center;font-size:10px;color:#5A6276;}
.legend-item{display:flex;align-items:center;gap:4px;}
.legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block;flex-shrink:0;}

/* ── 컨트롤바 ── */
.ctrlbar{background:#fff;border-bottom:1px solid #E2E6ED;padding:6px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:57px;z-index:39;}
.filter-btn{padding:4px 13px;font-size:11px;border:1px solid #C8CDD8;border-radius:20px;cursor:pointer;font-family:inherit;background:#fff;color:#5A6276;transition:all .15s;}
.filter-btn.active{background:#1E3A5F;border-color:#1E3A5F;color:#fff;}
.ctrl-btn{padding:4px 10px;font-size:11px;border:1px solid #C8CDD8;border-radius:6px;background:#fff;color:#5A6276;cursor:pointer;font-family:inherit;}
.ctrl-btn:hover{background:#F0F4FF;color:#1E3A5F;}
.add-btn{padding:4px 11px;font-size:11px;border:1px dashed #C8CDD8;border-radius:6px;background:transparent;color:#5A6276;cursor:pointer;font-family:inherit;}
.add-btn:hover{background:#F7F8FA;color:#1E3A5F;border-color:#1E3A5F;}
.sep{width:1px;height:18px;background:#C8CDD8;margin:0 2px;flex-shrink:0;}
.save-btn{padding:4px 11px;font-size:11px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;}
.save-btn.save{border:1px solid #1D9E75;background:#E4F5EF;color:#0F6E56;}
.save-btn.save:hover{background:#C8EDE0;}
.save-btn.pdf{border:1px solid #7265CC;background:#E8DAEF;color:#4A3A9A;}
.save-btn.pdf:hover{background:#D8C8E8;}
.save-indicator{font-size:10px;color:#1D9E75;align-self:center;display:none;}
.undo-btn{padding:4px 10px;font-size:11px;border:1px solid #C8CDD8;border-radius:6px;background:#fff;color:#5A6276;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;}
.undo-btn:hover:not(:disabled){background:#FFF8E8;color:#BA7517;border-color:#BA7517;}
.undo-btn:disabled{opacity:.35;cursor:not-allowed;}

/* ── 연도 섹션 ── */
.year-header{display:flex;align-items:center;gap:8px;padding:8px 20px;background:#fff;cursor:pointer;user-select:none;position:sticky;top:95px;z-index:38;border-bottom:1px solid #E2E6ED;border-top:2px solid #E2E6ED;}
.year-header:hover{background:#F5F7FA;}
.year-arrow{font-size:11px;color:#C87040;transition:transform .2s;flex-shrink:0;}
.year-arrow.open{transform:rotate(90deg);}
.year-label{font-size:13px;font-weight:700;color:#B84D00;letter-spacing:.3px;}
.year-badge{font-size:10px;color:#C87040;margin-left:4px;}
.year-add-btn{margin-left:auto;padding:3px 10px;font-size:10px;border:1px solid #C8CDD8;border-radius:5px;background:transparent;color:#5A6276;cursor:pointer;font-family:inherit;}
.year-add-btn:hover{background:#F0F4FF;color:#1E3A5F;border-color:#1E3A5F;}
.year-del-btn{padding:3px 8px;font-size:10px;border:1px solid #F0C0C0;border-radius:5px;background:transparent;color:#C44F78;cursor:pointer;font-family:inherit;}
.year-del-btn:hover{background:#FAEAF1;}

/* ── 차트 ── */
.chart-wrap{overflow-x:auto;}
.gantt{border-collapse:collapse;min-width:max-content;}
.gantt th,.gantt td{vertical-align:middle;}

/* 헤더 */
.th-month{height:30px;background:#fff;color:#1E3A5F;font-size:11px;font-weight:600;text-align:center;border-right:1px solid #E2E6ED;border-bottom:2px solid #C8CDD8;white-space:nowrap;}
.th-week{height:17px;font-size:8px;font-weight:500;text-align:center;border-bottom:2px solid #C8CDD8;white-space:nowrap;color:#8C93A4;background:#EFF2F7;}
.th-week.today-wh{background:#FDE8E8;color:#C0392B;font-weight:700;}
.th-label-m{min-width:280px;width:280px;background:#fff;color:#1E3A5F;font-size:11px;font-weight:600;text-align:left;padding-left:14px;position:sticky;left:0;z-index:30;border-right:2px solid #E2E6ED;border-bottom:2px solid #C8CDD8;}
.th-label-w{min-width:280px;width:280px;background:#EFF2F7;font-size:10px;font-weight:600;text-align:left;padding-left:14px;color:#5A6276;position:sticky;left:0;z-index:30;border-right:2px solid #C8CDD8;border-bottom:2px solid #C8CDD8;}

/* 섹션 */
.td-sec{height:22px;font-size:11px;font-weight:700;padding-left:14px;letter-spacing:.4px;}

/* 라벨 셀 */
.td-label{min-width:280px;width:280px;border-right:2px solid #C8CDD8;border-bottom:1px solid #E2E6ED;position:sticky;left:0;z-index:10;}
.label-inner{display:flex;align-items:center;padding:0 6px 0 10px;gap:6px;}
.type-badge{font-size:8px;font-weight:700;padding:2px 5px;border-radius:8px;flex-shrink:0;white-space:nowrap;align-self:flex-start;margin-top:4px;}
.label-client{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1A1F2E;line-height:1.35;}
.label-proj{font-size:10px;color:#5A6276;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35;margin-top:1px;}
.label-sub{font-size:10px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#344054;}
.label-sub-meta{font-size:9px;color:#A0A8B8;margin-top:1px;}
.label-strong{color:#2563A8;font-weight:600;margin-left:4px;}
.label-text-wrap{flex:1;min-width:0;}
.arrow{font-size:10px;color:#8C93A4;flex-shrink:0;transition:transform .2s;display:inline-block;}
.arrow.open{transform:rotate(90deg);}
.row-btns{display:flex;gap:2px;flex-shrink:0;}
.row-btn{width:20px;height:20px;border-radius:4px;border:none;background:transparent;color:transparent;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;font-family:inherit;}

/* 주 셀 */
.td-week{width:17px;min-width:17px;max-width:17px;padding:3px 0;border-bottom:1px solid #E2E6ED;position:relative;}
.td-week.mf{border-left:2px solid #C8CDD8;}
.td-week:not(.mf){border-left:1px solid #E2E6ED;}
.bar-wrap{position:relative;width:100%;}
.bar-fill{position:absolute;inset:0;}
.bar-dots{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:2px;pointer-events:none;}
.dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,0.9);flex-shrink:0;display:block;}

/* 툴팁 */
.tip{position:fixed;background:#1E3A5F;color:#fff;padding:7px 11px;border-radius:7px;font-size:10px;white-space:nowrap;z-index:500;line-height:1.8;pointer-events:none;box-shadow:0 4px 14px rgba(0,0,0,0.2);display:none;}
.tip strong{display:block;font-size:11px;margin-bottom:1px;}
.tip-muted{color:rgba(255,255,255,0.72);}

/* ── 모달 ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:12px;padding:24px;width:440px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.field-label{font-size:10px;color:#8C93A4;display:block;margin-bottom:3px;}
.field-input{width:100%;padding:6px 8px;border:1px solid #C8CDD8;border-radius:6px;font-size:12px;font-family:inherit;color:#1a1f2e;}
.field-input:focus{outline:2px solid #2563A8;outline-offset:-1px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:6px;}
.span-block{background:#F7F8FA;border-radius:8px;padding:10px 12px;margin-bottom:8px;position:relative;}
.int-btn{flex:1;padding:5px 0;border-radius:6px;font-size:12px;font-family:inherit;cursor:pointer;font-weight:600;border:1px solid #C8CDD8;background:#fff;color:#5A6276;transition:all .15s;}
.int-btn.active-strong{background:#2563A8;color:#fff;border-color:#2563A8;}
.int-btn.active-weak{background:#A0A8B8;color:#fff;border-color:#A0A8B8;}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.btn-cancel{flex:1;padding:9px;border-radius:7px;border:1px solid #C8CDD8;background:#fff;font-size:13px;cursor:pointer;color:#5A6276;font-family:inherit;}
.btn-save{flex:1;padding:9px;border-radius:7px;border:none;background:#1E3A5F;color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-del-confirm{padding:7px 18px;border-radius:7px;border:none;background:#C44F78;color:#fff;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-add-span{font-size:11px;padding:3px 10px;border-radius:6px;border:1px dashed #C8CDD8;background:transparent;color:#5A6276;cursor:pointer;font-family:inherit;}

/* ── 인쇄 스타일 ── */

/* 배경색·배경이미지 강제 출력 (가장 중요) */
* {
  -webkit-print-color-adjust: exact !important;
  print-color-adjust: exact !important;
}

@media print {
  /* UI 요소 숨김 */
  .toolbar,.ctrlbar,.tip,.modal-overlay { display:none !important; }

  /* 레이아웃 */
  body { background:#fff !important; margin:0; padding:0; }
  .year-header { position:static !important; top:auto !important; z-index:auto !important; }
  .chart-wrap { overflow:visible !important; }
  .gantt { min-width:unset !important; }

  /* 고정 열 해제 */
  .td-label, .th-label-m, .th-label-w { position:static !important; }
  thead { position:static !important; }

  /* 컬러 바 강제 출력 */
  .bar-fill {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    opacity: 1 !important;
  }
  .bar-dots, .dot {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* 배경색 있는 헤더들 */
  .th-month, .th-label-m, .year-header,
  .td-sec, .type-badge,
  .th-week.today-wh {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }

  /* 페이지 설정 */
  @page { size:A3 landscape; margin:8mm; }
}
</style>
</head>
<body>

<!-- 툴바 -->
<div class="toolbar">
  <div>
    <div class="toolbar-title">갑우 콘텐츠사업부 — 연간 프로젝트</div>
    <div class="toolbar-sub">연도별 펼치기/접기 · 자동 저장 · PDF 인쇄 지원</div>
  </div>
  <div class="legend" id="legend"></div>
</div>

<!-- 컨트롤바 -->
<div class="ctrlbar">
  <button class="filter-btn active" data-filter="all" onclick="setFilter(this)">전체</button>
  <button class="filter-btn" data-filter="정기" onclick="setFilter(this)">정기</button>
  <button class="filter-btn" data-filter="비정기" onclick="setFilter(this)">비정기</button>
  <div class="sep"></div>
  <button class="ctrl-btn" onclick="expandAll()">전체 펼치기</button>
  <button class="ctrl-btn" onclick="collapseAll()">전체 접기</button>
  <div class="sep"></div>
  <button class="add-btn" onclick="openAddYear()">＋ 연도 추가</button>
  <button class="add-btn" onclick="openAddModal(null)">＋ 프로젝트 추가</button>
  <div class="sep"></div>
  <button class="undo-btn" id="undoBtn" onclick="undo()" disabled title="되돌리기 (Ctrl+Z)">↩ 되돌리기</button>
  <span id="undoCount" style="font-size:10px;color:#A0A8B8;align-self:center;display:none;"></span>
  <div class="sep"></div>
  <button class="save-btn save" onclick="saveToStorage()">💾 저장</button>
  <span class="save-indicator" id="saveIndicator">✓ 저장됨</span>
  <span style="display:flex;gap:4px;align-items:center;">
    <button class="save-btn pdf" onclick="printChart('expanded')" title="하위 기간까지 모두 펼쳐서 인쇄">🖨 전체 펼쳐 인쇄</button>
    <button class="save-btn pdf" onclick="printChart('collapsed')" title="업체명만 보이는 요약 형태로 인쇄">🖨 요약 인쇄</button>
  </span>
</div>

<!-- 차트 영역 -->
<div id="chartArea"></div>

<!-- 툴팁 -->
<div class="tip" id="tip"></div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal-box" style="max-width:300px;padding:24px 28px;">
    <p id="confirmMsg" style="font-size:14px;color:#1a1f2e;margin-bottom:20px;line-height:1.6;font-weight:500;"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn-cancel" style="flex:none;padding:7px 18px;" onclick="closeConfirm()">취소</button>
      <button class="btn-del-confirm" id="confirmOkBtn">삭제</button>
    </div>
  </div>
</div>

<!-- 연도 추가 모달 -->
<div class="modal-overlay" id="yearModal">
  <div class="modal-box" style="max-width:300px;">
    <p style="font-size:15px;font-weight:700;color:#1E3A5F;margin-bottom:16px;">연도 추가</p>
    <div style="margin-bottom:16px;">
      <label class="field-label">연도</label>
      <input class="field-input" type="number" id="newYearInput" value="2027" min="2020" max="2050">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeYearModal()">취소</button>
      <button class="btn-save" onclick="saveYear()">추가</button>
    </div>
  </div>
</div>

<!-- 프로젝트 추가/수정 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <span id="modalTitle" style="font-size:15px;font-weight:700;color:#1E3A5F;"></span>
      <button onclick="closeEditModal()" style="border:none;background:none;font-size:18px;color:#8C93A4;cursor:pointer;padding:0;line-height:1;">✕</button>
    </div>
    <div id="modalBody"></div>
    <div id="editModalDeleteWrap" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #FAEAF1;">
      <button style="width:100%;padding:8px;border-radius:7px;border:1px solid #F0C0CC;background:#FDF0F3;color:#C44F78;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;" onclick="deleteFromEditModal()">🗑 이 프로젝트 삭제</button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="btn-save" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

const HISTORY=[];
const MAX_HISTORY=30;

function pushHistory(){
  // 변경 전 상태를 스택에 보존
  HISTORY.push(JSON.stringify(STATE));
  if(HISTORY.length>MAX_HISTORY) HISTORY.shift();
  updateUndoBtn();
  saveToCloud(false);
}

function undo(){
  if(!HISTORY.length) return;
  STATE=JSON.parse(HISTORY.pop());
  saveToCloud(false);
  updateUndoBtn();
  render();
  // 되돌림 표시
  const ind=document.getElementById('saveIndicator');
  ind.textContent='↩ 되돌렸습니다';ind.style.color='#BA7517';ind.style.display='inline';
  setTimeout(()=>{ind.style.display='none';ind.textContent='✓ 저장됨';ind.style.color='#1D9E75';},1800);
}

function updateUndoBtn(){
  const btn=document.getElementById('undoBtn');
  const cnt=document.getElementById('undoCount');
  btn.disabled=HISTORY.length===0;
  if(HISTORY.length>0){cnt.textContent=`${HISTORY.length}단계`;cnt.style.display='inline';}
  else{cnt.style.display='none';}
}

// Ctrl+Z 단축키
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){
    e.preventDefault(); undo();
  }
});

function saveToStorage(){ saveToCloud(true); }

// Firebase 저장 (DB_REF 없으면 로컬 폴백)
function saveToCloud(showMsg){
  if(!DB_REF){
    try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(STATE)); }catch(e){}
    return;
  }
  _isRemoteUpdate=true;
  DB_REF.set(STATE).then(function(){
    _isRemoteUpdate=false;
    if(showMsg){
      const ind=document.getElementById('saveIndicator');
      ind.textContent='✓ 저장됨';ind.style.color='#1D9E75';ind.style.display='inline';
      setTimeout(()=>ind.style.display='none',2000);
    }
  }).catch(function(err){
    _isRemoteUpdate=false;
    alert('저장 실패: '+err.message);
  });
}

   헤더 HTML 생성 (연도별 테이블 공용)
════════════════════════════════════════════ */
function makeHeader(year){
  setCalendar(year);
  const isCurrentYear=(year===TODAY_YEAR);
  const todayIdx=(YEAR_CAL[year]||YEAR_CAL[2026]).todayIdx;
  let r1=`<tr><th class="th-label-m"></th>`;
  MONTHS.forEach((m,i)=>{
    const bl=i===0?'border-left:2px solid #C8CDD8;':'';
    r1+=`<th class="th-month" colspan="${m.w}" style="${bl}">${m.l}</th>`;
  });
  r1+=`</tr><tr><th class="th-label-w">업체 / 프로젝트명</th>`;
  let gi=0;
  MONTHS.forEach(m=>{
    for(let w=1;w<=m.w;w++){
      const bl=w===1?'border-left:2px solid #C8CDD8;':'border-left:1px solid #E2E6ED;';
      const tod=isCurrentYear&&gi===todayIdx?' today-wh':'';
      r1+=`<th class="th-week${tod}" style="${bl}" title="${WDATES[gi]}">${w}</th>`;
      gi++;
    }
  });
  return r1+`</tr>`;
}

/* ════════════════════════════════════════════
   주차 셀 생성
════════════════════════════════════════════ */
function makeWeekCells(spansArr, color, opacity, barH, year){
  setCalendar(year);
  const isCurrentYear=(year===TODAY_YEAR);
  const todayIdx=(YEAR_CAL[year]||YEAR_CAL[2026]).todayIdx;
  let cells='';
  let gi=0;
  MONTHS.forEach(m=>{
    for(let w=1;w<=m.w;w++){
      const mf=w===1?' mf':'';
      const todBg=isCurrentYear&&gi===todayIdx?'background:#FFF5F5;':'';
      const span=spansArr.find(s=>gi>=s.sIdx&&gi<=s.eIdx);
      if(span){
        const isS=gi===span.sIdx,isE=gi===span.eIdx;
        const br=isS&&isE?'4px':isS?'4px 0 0 4px':isE?'0 4px 4px 0':'0';
        const dotsHtml=span.dots>0?`<div class="bar-dots">${'<span class="dot"></span>'.repeat(span.dots)}</div>`:'';
        cells+=`<td class="td-week${mf}" data-gi="${gi}" style="${todBg}"><div class="bar-wrap" style="height:${barH}px"><div class="bar-fill" style="background:${color};opacity:${opacity};border-radius:${br}"></div>${dotsHtml}</div></td>`;
      } else {
        cells+=`<td class="td-week${mf}" style="${todBg}"></td>`;
      }
      gi++;
    }
  });
  return cells;
}

  STATE.years.forEach(yd=>{
    if(!Array.isArray(yd.data)) yd.data=[];   // data 누락 복구
    const {year,expanded:yExp,data}=yd;

    // 연도 헤더

    if(!yExp) return;

    // 테이블
    const wrap=document.createElement('div');
    wrap.className='chart-wrap';
    const table=document.createElement('table');
    table.className='gantt';

    // thead
    const thead=document.createElement('thead');
    thead.innerHTML=makeHeader(year);
    table.appendChild(thead);

    // tbody
    const tbody=document.createElement('tbody');

    ['정기','비정기'].forEach(cat=>{
      let catData=data.filter(p=>p.cat===cat);
      if(!catData.length)return;

      // 섹션 행
      const secTr=document.createElement('tr');
      secTr.innerHTML=`<td class="td-sec" colspan="${1+TW}" style="background:${cat==='정기'?'#E8F0FB':'#EDEAFB'};color:${cat==='정기'?'#1A3A7A':'#3D2A8A'};border-bottom:1px solid ${cat==='정기'?'#C0D4F0':'#CEC8F0'}">●  ${cat==='정기'?'정기 프로젝트':'비정기 프로젝트'}</td>`;
      tbody.appendChild(secTr);

      catData.forEach((p,pi)=>{
        if(!Array.isArray(p.spans)) p.spans=[];   // spans 누락 복구
        const color=TYPE_COLOR[p.type]||'#7A8496';
        const bgc=TYPE_BG[p.type]||'#eaecee';
        const rowBg=pi%2===0?'#fff':'#FAFBFD';
        const isExp=p.expanded;

        const allS=p.spans.map(s=>wi(s.sm,s.sw));
        const allE=p.spans.map(s=>wi(s.em,s.ew));
        if(!allS.length){ return; }   // 기간 없는 프로젝트는 건너뜀
        const gSIdx=Math.min(...allS),gEIdx=Math.max(...allE);

        // 상위 행
        const gTr=document.createElement('tr');
        gTr.style.cursor='pointer';
        gTr.innerHTML=`
          <td class="td-label" style="background:${rowBg};height:42px;">

              <span class="arrow${isExp?' open':''}">▶</span>

          gTr.querySelectorAll('td:not([data-gi])').forEach(td=>td.style.background=rowBg);
          gTr.querySelectorAll('.row-btn').forEach(b=>{b.style.color='transparent';b.style.background='transparent';});
        });
        gTr.addEventListener('click',e=>{
          const btn=e.target.closest('.row-btn');
          if(btn){
            e.stopPropagation();
            if(btn.dataset.action==='del') openConfirmProj(+btn.dataset.year,+btn.dataset.id);
            else openEditModal(+btn.dataset.year,+btn.dataset.id);
            return;
          }
          toggleProj(year,p.id);
        });
        attachTip(gTr,()=>`<strong>${p.client}</strong>${p.proj} · ${p.cycle}<br><span class="tip-muted">전체: ${WDATES[gSIdx]} ~ ${WDATES[gEIdx]}</span>${p.owner?`<br><span class="tip-muted">담당: ${p.owner}</span>`:''}`);
        tbody.appendChild(gTr);

        // 하위 행
        if(isExp){
          p.spans.forEach((span,si)=>{
            const sBg=si%2===0?'#F4F7FF':'#EEF3FF';
            const sIdx=wi(span.sm,span.sw),eIdx=wi(span.em,span.ew);
            const dots=span.intensity==='강'?1:0;
            const sTr=document.createElement('tr');
            sTr.innerHTML=`
              <td class="td-label" style="background:${sBg};height:33px;">
                <div class="label-inner" style="padding-left:20px;gap:4px;">
                  <span style="font-size:9px;color:#C8CDD8;flex-shrink:0;">└</span>
                  <div class="label-text-wrap">
                    <div class="label-sub">${span.label||'(레이블 없음)'}</div>
                    <div class="label-sub-meta">${WDATES[sIdx]} ~ ${WDATES[eIdx]}${span.intensity==='강'?'<span class="label-strong">● 강</span>':''}</div>
                  </div>
                </div>
              </td>
              ${makeWeekCells([{sIdx,eIdx,dots}],color,0.88,12,year)}
            `;
            sTr.addEventListener('mouseenter',()=>sTr.querySelectorAll('td').forEach(td=>td.style.background='#E8EEFF'));
            sTr.addEventListener('mouseleave',()=>sTr.querySelectorAll('td').forEach(td=>td.style.background=sBg));
            attachTip(sTr,()=>`<strong>${span.label||p.proj}</strong><span class="tip-muted">${WDATES[sIdx]} ~ ${WDATES[eIdx]}</span><br><span class="tip-muted">작업 강도: ${span.intensity||'약'}</span>`);
            tbody.appendChild(sTr);
          });
        }
      });
    });

    table.appendChild(tbody);
    wrap.appendChild(table);
    area.appendChild(wrap);
  });
}

/* ════════════════════════════════════════════
   토글
════════════════════════════════════════════ */
function toggleYear(year){
  const yd=STATE.years.find(y=>y.year===year);
  if(yd){yd.expanded=!yd.expanded;autoSave();render();}
}
function toggleProj(year,id){
  const yd=STATE.years.find(y=>y.year===year);
  if(!yd)return;
  const p=yd.data.find(x=>x.id===id);
  if(p){p.expanded=!p.expanded;autoSave();render();}
}
function expandAll(){
  STATE.years.forEach(yd=>{yd.expanded=true;yd.data.forEach(p=>p.expanded=true);});
  autoSave();render();
}
function collapseAll(){
  STATE.years.forEach(yd=>{yd.data.forEach(p=>p.expanded=false);});
  autoSave();render();
}

/* ════════════════════════════════════════════
   연도 추가/삭제
════════════════════════════════════════════ */
function openAddYear(){document.getElementById('yearModal').classList.add('open');}
function closeYearModal(){document.getElementById('yearModal').classList.remove('open');}
function saveYear(){
  const yr=parseInt(document.getElementById('newYearInput').value);
  if(!yr||yr<2020||yr>2050){alert('올바른 연도를 입력해주세요.');return;}
  if(STATE.years.find(y=>y.year===yr)){alert('이미 존재하는 연도입니다.');return;}
  STATE.years.push({year:yr,expanded:true,data:[]});
  STATE.years.sort((a,b)=>a.year-b.year);
  autoSave();closeYearModal();render();
}

/* ════════════════════════════════════════════
   삭제 확인
════════════════════════════════════════════ */
let confirmCallback=null;
function openConfirm(msg,cb){
  document.getElementById('confirmMsg').textContent=msg;
  confirmCallback=cb;
  document.getElementById('confirmModal').classList.add('open');
}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('open');confirmCallback=null;}
document.getElementById('confirmOkBtn').onclick=function(){if(confirmCallback)confirmCallback();closeConfirm();};

function openConfirmYear(year){
  openConfirm(`${year}년 전체 데이터를 삭제할까요? 복구할 수 없습니다.`,()=>{
    STATE.years=STATE.years.filter(y=>y.year!==year);
    autoSave();render();
  });
}
function openConfirmProj(year,id,nameOverride){
  const yd=STATE.years.find(y=>y.year===year);
  const p=yd&&yd.data.find(x=>x.id===id);
  const name=nameOverride||(p?p.client:'이 프로젝트');
  openConfirm(`「${name}」를 삭제할까요?`,()=>{
    const yd2=STATE.years.find(y=>y.year===year);
    if(yd2)yd2.data=yd2.data.filter(x=>x.id!==id);
    autoSave();render();
  });
}

/* ════════════════════════════════════════════
   스팬 블록
════════════════════════════════════════════ */
let modalSpans=[];
function spanBlockHTML(s,si,total){
  const mOpts=[...Array(12)].map((_,i)=>({v:i+1,l:`${i+1}월`}));
  const wOpts=[1,2,3,4,5,6].map(v=>({v,l:`${v}주`}));
  const selHTML=(k,val,opts)=>`<select class="field-input" data-si="${si}" data-key="${k}">${opts.map(o=>`<option value="${o.v}"${o.v==val?' selected':''}>${o.l}</option>`).join('')}</select>`;
  const rmBtn=total>1?`<button type="button" onclick="removeSpanBlock(${si})" style="position:absolute;top:8px;right:8px;border:none;background:none;font-size:14px;color:#C8CDD8;cursor:pointer;padding:0;line-height:1;">✕</button>`:'';
  return `<div class="span-block" id="spanblock-${si}">${rmBtn}
    <div class="grid2">
      <div><label class="field-label">하위 레이블</label><input class="field-input" type="text" data-si="${si}" data-key="label" value="${s.label||''}" placeholder="예: 봄호, 1분기..."></div>
      <div><label class="field-label">작업 강도</label><div style="display:flex;gap:4px;margin-top:2px;">
        <button type="button" class="int-btn${(s.intensity||'약')==='강'?' active-strong':''}" data-si="${si}" data-int="강" onclick="setIntensity(this)">강</button>
        <button type="button" class="int-btn${(s.intensity||'약')==='약'?' active-weak':''}" data-si="${si}" data-int="약" onclick="setIntensity(this)">약</button>
      </div></div>
    </div>
    <div class="grid4">
      <div><label class="field-label">시작월</label>${selHTML('sm',s.sm,mOpts)}</div>
      <div><label class="field-label">시작주</label>${selHTML('sw',s.sw,wOpts)}</div>
      <div><label class="field-label">종료월</label>${selHTML('em',s.em,mOpts)}</div>
      <div><label class="field-label">종료주</label>${selHTML('ew',s.ew,wOpts)}</div>
    </div>
  </div>`;
}
function setIntensity(btn){
  const si=+btn.dataset.si,lv=btn.dataset.int;
  modalSpans[si].intensity=lv;
  const blk=document.getElementById(`spanblock-${si}`);
  blk.querySelectorAll('.int-btn').forEach(b=>{
    b.className='int-btn'+(b.dataset.int==='강'&&lv==='강'?' active-strong':b.dataset.int==='약'&&lv==='약'?' active-weak':'');
  });
}
function addSpanBlock(){
  modalSpans.push({id:`new-${Date.now()}`,label:'',sm:1,sw:1,em:1,ew:1,intensity:'약'});
  refreshSpans();
}
function removeSpanBlock(si){
  if(modalSpans.length<=1)return;
  modalSpans.splice(si,1);refreshSpans();
}
function refreshSpans(){
  document.getElementById('spanBlocksWrap').innerHTML=modalSpans.map((s,si)=>spanBlockHTML(s,si,modalSpans.length)).join('');
}
function collectSpans(){
  document.querySelectorAll('#spanBlocksWrap select').forEach(sel=>{
    modalSpans[+sel.dataset.si][sel.dataset.key]=+sel.value;
  });
  document.querySelectorAll('#spanBlocksWrap input[data-key="label"]').forEach(inp=>{
    modalSpans[+inp.dataset.si].label=inp.value;
  });
}

/* ════════════════════════════════════════════
   추가/수정 모달
════════════════════════════════════════════ */
let modalMode='add',editingYear=null,editingId=null;
function closeEditModal(){document.getElementById('editModal').classList.remove('open');}

function openAddModal(year){
  modalMode='add';editingYear=year;editingId=null;
  modalSpans=[{id:`new-${Date.now()}`,label:'',sm:1,sw:1,em:1,ew:1,intensity:'약'}];
  document.getElementById('modalTitle').textContent='프로젝트 추가';
  const yearOpts=STATE.years.map(y=>`<option value="${y.year}"${y.year===year?' selected':''}>${y.year}년</option>`).join('');
  document.getElementById('modalBody').innerHTML=`
    <div class="grid2">
      <div><label class="field-label">연도</label><select class="field-input" id="m-year">${yearOpts}</select></div>
      <div><label class="field-label">구분</label><select class="field-input" id="m-cat"><option>정기</option><option>비정기</option></select></div>
    </div>
    <div class="grid2">
      <div><label class="field-label">업체명</label><input class="field-input" type="text" id="m-client" placeholder="예: 한림원"></div>
      <div><label class="field-label">작업 성격</label><select class="field-input" id="m-type">${TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    </div>
    <div style="margin-bottom:10px;"><label class="field-label">프로젝트명</label><input class="field-input" type="text" id="m-proj" placeholder="예: 한림원의 창"></div>
    <div class="grid2">
      <div><label class="field-label">주기</label><select class="field-input" id="m-cycle"><option>월간</option><option>계간</option><option>정기</option><option>수시</option></select></div>
      <div><label class="field-label">담당자</label><input class="field-input" type="text" id="m-owner" placeholder="예: 이"></div>
    </div>
    <div style="border-top:1px solid #E2E6ED;padding-top:12px;margin-top:4px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:11px;font-weight:700;color:#5A6276;">하위 기간</span>
        <button type="button" class="btn-add-span" onclick="addSpanBlock()">＋ 기간 추가</button>
      </div>
      <div id="spanBlocksWrap">${modalSpans.map((s,si)=>spanBlockHTML(s,si,1)).join('')}</div>
    </div>`;
  document.getElementById('editModalDeleteWrap').style.display='none';
  document.getElementById('editModal').classList.add('open');
}

function openEditModal(year,id){
  const yd=STATE.years.find(y=>y.year===year);
  const p=yd&&yd.data.find(x=>x.id===id);
  if(!p)return;
  modalMode='edit';editingYear=year;editingId=id;
  modalSpans=p.spans.map(s=>({...s}));
  document.getElementById('modalTitle').textContent=`${p.client} 수정 (${year}년)`;
  document.getElementById('modalBody').innerHTML=`
    <div class="grid2">
      <div><label class="field-label">구분</label><select class="field-input" id="m-cat"><option${p.cat==='정기'?' selected':''}>정기</option><option${p.cat==='비정기'?' selected':''}>비정기</option></select></div>
      <div><label class="field-label">작업 성격</label><select class="field-input" id="m-type">${TYPES.map(t=>`<option${p.type===t?' selected':''}>${t}</option>`).join('')}</select></div>
    </div>
    <div class="grid2">
      <div><label class="field-label">프로젝트명</label><input class="field-input" type="text" id="m-proj" value="${p.proj}"></div>
      <div><label class="field-label">주기</label><select class="field-input" id="m-cycle">${['월간','계간','정기','수시'].map(c=>`<option${p.cycle===c?' selected':''}>${c}</option>`).join('')}</select></div>
    </div>
    <div class="grid2">
      <div><label class="field-label">업체명</label><input class="field-input" type="text" id="m-client" value="${p.client||''}"></div>
      <div><label class="field-label">담당자</label><input class="field-input" type="text" id="m-owner" value="${p.owner||''}"></div>
    </div>
    <div style="border-top:1px solid #E2E6ED;padding-top:12px;margin-top:4px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:11px;font-weight:700;color:#5A6276;">하위 기간</span>
        <button type="button" class="btn-add-span" onclick="addSpanBlock()">＋ 기간 추가</button>
      </div>
      <div id="spanBlocksWrap">${modalSpans.map((s,si)=>spanBlockHTML(s,si,modalSpans.length)).join('')}</div>
    </div>`;
  document.getElementById('editModalDeleteWrap').style.display='block';
  document.getElementById('editModal').classList.add('open');
}

function deleteFromEditModal(){
  if(!editingYear||!editingId) return;
  const yd=STATE.years.find(y=>y.year===editingYear);
  const p=yd&&yd.data.find(x=>x.id===editingId);
  closeEditModal();
  openConfirmProj(editingYear, editingId, p?p.client:null);
}

function saveModal(){
  collectSpans();
  if(modalMode==='add'){
    const client=(document.getElementById('m-client').value||'').trim();
    if(!client){alert('업체명을 입력해주세요.');return;}
    const targetYear=parseInt(document.getElementById('m-year').value);
    const yd=STATE.years.find(y=>y.year===targetYear);
    if(!yd){alert('연도를 찾을 수 없습니다.');return;}
    yd.data.push({
      id:STATE.nextId++,
      cat:document.getElementById('m-cat').value,
      client,
      proj:document.getElementById('m-proj').value||client,
      type:document.getElementById('m-type').value,
      cycle:document.getElementById('m-cycle').value,
      owner:document.getElementById('m-owner').value,
      expanded:false,
      spans:modalSpans.map((s,i)=>({...s,id:`${STATE.nextId}-${i}`}))
    });
  } else {
    const yd=STATE.years.find(y=>y.year===editingYear);
    if(yd){
      const newCat=document.getElementById('m-cat').value;
      const newClient=(document.getElementById('m-client').value||'').trim();
      if(!newClient){alert('업체명을 입력해주세요.');return;}
      yd.data=yd.data.map(p=>p.id!==editingId?p:{
        ...p,
        cat:newCat,
        client:newClient,
        proj:document.getElementById('m-proj').value,
        type:document.getElementById('m-type').value,
        cycle:document.getElementById('m-cycle').value,
        owner:document.getElementById('m-owner').value,
        spans:modalSpans
      });
    }
  }
  autoSave();closeEditModal();render();
}

/* ════════════════════════════════════════════
   PDF / 인쇄
════════════════════════════════════════════ */
function printChart(mode){
  const snapshot=JSON.parse(JSON.stringify(STATE));
  if(mode==='expanded'){
    // 전체 펼치기: 연도·하위 기간 모두 펼침
    STATE.years.forEach(yd=>{yd.expanded=true;yd.data.forEach(p=>p.expanded=true);});
  } else {
    // 요약: 연도는 펼치되, 하위 기간(스팬)은 접음
    STATE.years.forEach(yd=>{yd.expanded=true;yd.data.forEach(p=>p.expanded=false);});
  }
  render();
  setTimeout(()=>{
    window.print();
    // 인쇄 후 원래 상태 복원
    STATE.years=snapshot.years;
    render();
  },300);
}

<script>
// Firebase가 삭제한 빈 배열 필드를 복구하는 정규화 함수
function normalizeState(st){
  if(!st) return;
  if(!Array.isArray(st.years)) st.years=[];
  st.years.forEach(function(yd){
    if(!Array.isArray(yd.data)) yd.data=[];
    yd.data.forEach(function(p){
      if(!Array.isArray(p.spans)) p.spans=[];
    });
  });
}
</script>
